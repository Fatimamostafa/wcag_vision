name: wcag_vision_example
description: >-
  Demonstrates the wcag_vision package: WCAG contrast evaluation, CVD
  simulation, and k-means dominant-colour extraction.
publish_to: none

# Member of the repo's Dart pub workspace (see the root pubspec.yaml) so it
# resolves against the same shared lockfile as the package itself.
resolution: workspace

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  wcag_vision:
    path: ../

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/sample.png
