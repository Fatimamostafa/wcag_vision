name: wcag_vision_workspace

# Workspace root only — this package is never published and ships no code.
# It exists so Dart's pub workspaces (Flutter 3.44 / Dart 3.12) resolve every
# member package against a single, shared lockfile, and so Melos can run tasks
# across the monorepo.
#
# Layout per CLAUDE.md §3: Melos 8 + Dart pub workspaces. Melos derives its
# package list from the pub `workspace:` block below and reads its config from
# the `melos:` key in THIS file — there is deliberately no standalone
# melos.yaml (legacy layout; its scripts are ignored in workspace mode).
environment:
  sdk: ^3.12.2

# Pub workspace members. Melos also treats these as its package set.
# Add apps/a11y_scanner once it is scaffolded.
workspace:
  - packages/wcag_vision
  - packages/wcag_vision/example

dev_dependencies:
  melos: ^8.1.0

melos:
  scripts:
    analyze:
      description: >-
        Analyze every package with zero tolerance for issues (CLAUDE.md §8).
      exec: dart analyze --fatal-infos --fatal-warnings .

    # wcag_vision itself is pure Dart (no Flutter dependency, see CLAUDE.md
    # §2/§6), so its tests run under `dart test`, not `flutter test` —
    # keeping the package runnable outside Flutter entirely, including in
    # CI. The example app is a real Flutter app and needs `flutter test`.
    test:dart:
      description: Run tests in pure-Dart packages (no flutter dependency).
      exec: dart test
      packageFilters:
        flutter: false
        dirExists: test

    test:flutter:
      description: Run tests in Flutter packages/apps.
      exec: flutter test
      packageFilters:
        flutter: true
        dirExists: test
